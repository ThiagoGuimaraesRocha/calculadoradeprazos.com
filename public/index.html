<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Liste cada dia consecutivo a partir de uma data inicial e da quantidade informada. Contagem em dias corridos, sem feriados nem regras processuais.">
  <title>Calculadora de Prazos</title>
  <style>
    :root {
      /* Paleta institucional (CALC-7) */
      --color-bg-page: #f4f5f7;
      --color-header-bg: #1e3a5f;
      --color-header-text: #ffffff;
      --color-text: #1a2332;
      --color-text-muted: #4a5568;
      --color-card-bg: #ffffff;
      --color-card-border: #e2e5ea;
      /* Primário e foco com contraste AA (texto branco sobre o botão) */
      --color-primary: #1d4ed8;
      --color-primary-hover: #1e40af;
      --color-input-border: #cbd5e1;
      --color-focus-ring: #1d4ed8;
      --color-focus-ring-on-primary: #ffffff;
      --color-error-text: #991b1b;
      --color-error-bg: #fef2f2;
      --color-error-border: #fecaca;
      --touch-target-min: 2.75rem;

      --font-family: system-ui, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --font-size-base: 1rem;
      --line-height-base: 1.6;
      --card-max-width: 48rem;
      --page-padding-x: clamp(1rem, 4vw, 1.5rem);
      --card-padding: clamp(1.25rem, 4vw, 2rem);
      --card-radius: 0.5rem;
      --shadow-card: 0 1px 2px rgba(15, 23, 42, 0.06), 0 4px 16px rgba(15, 23, 42, 0.08);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-family);
      font-size: var(--font-size-base);
      line-height: var(--line-height-base);
      color: var(--color-text);
      background-color: var(--color-bg-page);
      margin: 0;
      min-height: 100vh;
    }

    header {
      background-color: var(--color-header-bg);
      color: var(--color-header-text);
      padding: clamp(1rem, 3vw, 1.25rem) var(--page-padding-x);
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: clamp(1.25rem, 3vw, 1.5rem);
      font-weight: 600;
      line-height: 1.3;
      letter-spacing: -0.01em;
    }

    .intro {
      margin: 0 0 1.5rem;
      color: var(--color-text-muted);
      font-size: var(--font-size-base);
      line-height: var(--line-height-base);
    }

    .container {
      max-width: var(--card-max-width);
      width: calc(100% - 2 * var(--page-padding-x));
      margin: clamp(1.5rem, 4vw, 2.5rem) auto;
      padding: var(--card-padding);
      padding-left: max(var(--card-padding), var(--page-padding-x));
      padding-right: max(var(--card-padding), var(--page-padding-x));
      background: var(--color-card-bg);
      border: 1px solid var(--color-card-border);
      border-radius: var(--card-radius);
      box-shadow: var(--shadow-card);
    }

    label {
      display: block;
      margin-top: 1rem;
      font-weight: 600;
      font-size: var(--font-size-base);
    }

    form label:first-of-type {
      margin-top: 0;
    }

    form {
      margin: 0;
    }

    input,
    button {
      width: 100%;
      font-family: inherit;
      font-size: var(--font-size-base);
      line-height: var(--line-height-base);
    }

    input {
      min-height: var(--touch-target-min);
      padding: 0.625rem 0.75rem;
      margin-top: 0.5rem;
      border-radius: 0.25rem;
      border: 1px solid var(--color-input-border);
      background: var(--color-card-bg);
      color: var(--color-text);
    }

    button {
      min-height: var(--touch-target-min);
      padding: 0.625rem 1rem;
      margin-top: 1rem;
      border-radius: 0.25rem;
      border: none;
      background-color: var(--color-primary);
      color: #ffffff;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background-color: var(--color-primary-hover);
    }

    button:active {
      background-color: var(--color-primary-hover);
    }

    input:focus {
      outline: none;
    }

    input:focus-visible {
      outline: 2px solid var(--color-focus-ring);
      outline-offset: 2px;
      border-color: var(--color-focus-ring);
    }

    button:focus {
      outline: none;
    }

    button:focus-visible {
      outline: 2px solid var(--color-focus-ring-on-primary);
      outline-offset: 2px;
      box-shadow: 0 0 0 4px var(--color-primary);
    }

    .form-error {
      margin: 1rem 0 0;
      padding: 0.75rem 1rem;
      border-radius: 0.25rem;
      border: 1px solid var(--color-error-border);
      background-color: var(--color-error-bg);
      color: var(--color-error-text);
      font-size: var(--font-size-base);
      line-height: var(--line-height-base);
    }

    .form-error[hidden] {
      display: none;
    }

    input[aria-invalid="true"] {
      border-color: var(--color-error-text);
    }

    section.result {
      margin-top: 2rem;
    }

    section.result h2 {
      margin: 0 0 0.75rem;
      font-size: 1.125rem;
      font-weight: 600;
      line-height: 1.4;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      padding: 0.625rem 0;
      border-bottom: 1px solid var(--color-card-border);
      font-size: var(--font-size-base);
      line-height: var(--line-height-base);
    }

    .counter {
      text-align: right;
      font-size: 0.875rem;
      line-height: var(--line-height-base);
      margin: 1.5rem 0 0;
      color: var(--color-text-muted);
    }
  </style>
</head>
<body>
  <header>
    <h1>Calculadora de Prazos</h1>
  </header>

  <main class="container">
    <p class="intro">
      Informe a data inicial e quantos dias deseja listar. A ferramenta mostra cada dia consecutivo em sequência (dias corridos). Não considera feriados, exclusão de fins de semana nem regras de prazo do processo civil ou penal.
    </p>

    <form id="formCalcular" action="#" method="get" novalidate>
      <label for="startDate">Data inicial</label>
      <input type="date" id="startDate" name="startDate" required>

      <label for="days">Quantidade de dias</label>
      <input type="number" id="days" name="days" min="1" required>

      <button type="button" id="btnCalcular">Calcular</button>
      <p id="erroFormulario" class="form-error" role="alert" hidden></p>
    </form>

    <section class="result" aria-labelledby="resultado-titulo">
      <h2 id="resultado-titulo">Resultado</h2>
      <ul id="listaDias"></ul>
    </section>

    <p class="counter">
      Acessos: <span id="contador"></span>
    </p>
  </main>

  <script>
    const formCalcular = document.getElementById('formCalcular');
    const inputStartDate = document.getElementById('startDate');
    const inputDays = document.getElementById('days');
    const erroFormulario = document.getElementById('erroFormulario');

    document.getElementById('btnCalcular').addEventListener('click', calcular);
    formCalcular.addEventListener('submit', function (event) {
      event.preventDefault();
      calcular();
    });

    inputStartDate.addEventListener('input', limparErro);
    inputDays.addEventListener('input', limparErro);

    function mostrarErro(mensagem) {
      erroFormulario.textContent = mensagem;
      erroFormulario.hidden = false;

      const dias = parseInt(inputDays.value, 10);
      const diasInvalidos = !inputDays.value || Number.isNaN(dias) || dias < 1;

      if (!inputStartDate.value) {
        inputStartDate.setAttribute('aria-invalid', 'true');
      } else {
        inputStartDate.removeAttribute('aria-invalid');
      }

      if (diasInvalidos) {
        inputDays.setAttribute('aria-invalid', 'true');
      } else {
        inputDays.removeAttribute('aria-invalid');
      }
    }

    function limparErro() {
      erroFormulario.textContent = '';
      erroFormulario.hidden = true;
      inputStartDate.removeAttribute('aria-invalid');
      inputDays.removeAttribute('aria-invalid');
    }

    function calcular() {
      const startDateInput = inputStartDate.value;
      const days = parseInt(inputDays.value, 10);
      const lista = document.getElementById('listaDias');

      lista.innerHTML = '';

      if (!startDateInput || !inputDays.value || Number.isNaN(days) || days < 1) {
        mostrarErro('Preencha a data inicial e a quantidade de dias (mínimo 1).');
        return;
      }

      limparErro();

      let currentDate = new Date(startDateInput);

      for (let i = 0; i < days; i++) {
        let li = document.createElement('li');

        let formattedDate = currentDate.toLocaleDateString('pt-BR', {
          weekday: 'long',
          year: 'numeric',
          month: '2-digit',
          day: '2-digit'
        });

        li.textContent = `Dia ${i + 1}: ${formattedDate}`;
        lista.appendChild(li);

        currentDate.setDate(currentDate.getDate() + 1);
      }
    }

    function atualizarContador() {
      let visitas = localStorage.getItem('visitas');

      if (!visitas) {
        visitas = 0;
      }

      visitas++;
      localStorage.setItem('visitas', visitas);

      document.getElementById('contador').textContent = visitas;
    }

    atualizarContador();
  </script>
</body>
</html>
