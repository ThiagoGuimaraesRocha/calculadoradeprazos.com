# Deploy estático para Cloudflare Pages (Vite + Vue 3 → dist/).
# Pré-requisitos no GitHub: Secrets CLOUDFLARE_API_TOKEN e CLOUDFLARE_ACCOUNT_ID.
name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Testes
        run: npm test

      - name: Build
        run: npm run build

      - name: Definir nome do projeto Pages
        id: pages
        run: |
          if [ -n "${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}" ]; then
            echo "project=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}" >> "$GITHUB_OUTPUT"
          else
            echo "project=calculadoradeprazos" >> "$GITHUB_OUTPUT"
          fi

      - name: Verificar secrets Cloudflare
        id: cloudflare
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CF_API_TOKEN" ] && [ -n "$CF_ACCOUNT_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Deploy desta action ignorado: secrets CLOUDFLARE_API_TOKEN e CLOUDFLARE_ACCOUNT_ID não configurados (Settings → Secrets and variables → Actions). O workflow pages-build-deployment do Cloudflare pode continuar publicando o site."
          fi

      - name: Deploy para Cloudflare Pages
        if: steps.cloudflare.outputs.ready == 'true'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ steps.pages.outputs.project }}
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
