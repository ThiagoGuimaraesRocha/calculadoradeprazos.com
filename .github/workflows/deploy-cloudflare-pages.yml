# Release (semantic-release) + build + deploy Cloudflare Pages em push em main.
# Secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID (deploy).
name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-and-deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Versão (semantic-release)
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          set +e
          npx semantic-release > semantic-release.log 2>&1
          exit_code=$?
          cat semantic-release.log
          if [ $exit_code -ne 0 ]; then
            echo "::error::semantic-release falhou (exit $exit_code)"
            exit $exit_code
          fi
          if grep -q "Published release" semantic-release.log; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            version=$(node -p "require('./package.json').version")
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "Nova versão publicada: v$version"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            version=$(node -p "require('./package.json').version")
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "Nenhum release novo (commits sem feat/fix/perf/refactor ou já liberados). Versão atual: v$version"
          fi

      - name: Testes
        run: npm test

      - name: Build
        run: npm run build

      - name: Definir nome do projeto Pages
        id: pages
        run: |
          if [ -n "${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}" ]; then
            echo "project=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}" >> "$GITHUB_OUTPUT"
          else
            echo "project=calculadoradeprazos" >> "$GITHUB_OUTPUT"
          fi

      - name: Verificar secrets Cloudflare
        id: cloudflare
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CF_API_TOKEN" ] && [ -n "$CF_ACCOUNT_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Deploy desta action ignorado: secrets CLOUDFLARE_API_TOKEN e CLOUDFLARE_ACCOUNT_ID não configurados (Settings → Secrets and variables → Actions). O workflow pages-build-deployment do Cloudflare pode continuar publicando o site."
          fi

      - name: Deploy para Cloudflare Pages
        if: steps.cloudflare.outputs.ready == 'true'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ steps.pages.outputs.project }}
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Resumo
        if: always()
        run: |
          echo "Versão no build: v${{ steps.release.outputs.version }}"
          if [ "${{ steps.release.outputs.released }}" = "true" ]; then
            echo "Release SemVer criado neste run (tag + CHANGELOG + package.json)."
          fi
